name: Deploy static site to Pages

# The daily pipeline pushes built HTML to main; this deploys it. Replaces the flaky legacy
# Jekyll build (which errored/wedged on this repo). The site is 100% static, so we just upload
# the repo as the Pages artifact and deploy it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
